name: "glyph"
description: "Ingest documentation and source code into a RAG knowledge base"
branding:
  icon: "database"
  color: "purple"

inputs:
  config:
    description: "Full glyph.yaml configuration content (supports secret interpolation via ${{ secrets.X }})"
    required: true
  commands:
    description: "Space-separated glyph commands to run in order: init-db, ingest, export, stats"
    required: false
    default: "ingest"
  source:
    description: "Source name filter (-s flag for ingest/export)"
    required: false
    default: ""
  version:
    description: "Version string (-V flag for export)"
    required: false
    default: ""
  python-version:
    description: "Python version to install"
    required: false
    default: "3.12"
  extra-args:
    description: "Extra CLI flags appended to glyph commands (e.g. --verbose, --skip-embeddings)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install build dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq build-essential

    - name: Install glyph
      shell: bash
      run: uv pip install --system "${{ github.action_path }}"

    - name: Write glyph config
      shell: bash
      env:
        GLYPH_CONFIG_CONTENT: ${{ inputs.config }}
      run: printf '%s\n' "$GLYPH_CONFIG_CONTENT" > "${{ runner.temp }}/glyph.yaml"

    - name: Run glyph commands
      shell: bash
      env:
        GLYPH_CONFIG: ${{ runner.temp }}/glyph.yaml
        GLYPH_EXTRA: ${{ inputs.extra-args }}
        GLYPH_SOURCE: ${{ inputs.source }}
        GLYPH_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        for cmd in ${{ inputs.commands }}; do
          case "$cmd" in
            init-db)
              echo "::group::glyph init-db"
              glyph -c "$GLYPH_CONFIG" $GLYPH_EXTRA init-db
              echo "::endgroup::"
              ;;
            ingest)
              echo "::group::glyph ingest"
              SOURCE_FLAG=""
              [ -n "$GLYPH_SOURCE" ] && SOURCE_FLAG="-s $GLYPH_SOURCE"
              glyph -c "$GLYPH_CONFIG" $GLYPH_EXTRA ingest $SOURCE_FLAG
              echo "::endgroup::"
              ;;
            export)
              echo "::group::glyph export"
              SOURCE_FLAG=""
              VERSION_FLAG=""
              [ -n "$GLYPH_SOURCE" ] && SOURCE_FLAG="-s $GLYPH_SOURCE"
              [ -n "$GLYPH_VERSION" ] && VERSION_FLAG="-V $GLYPH_VERSION"
              glyph -c "$GLYPH_CONFIG" $GLYPH_EXTRA export $SOURCE_FLAG $VERSION_FLAG
              echo "::endgroup::"
              ;;
            stats)
              echo "::group::glyph stats"
              glyph -c "$GLYPH_CONFIG" $GLYPH_EXTRA stats
              echo "::endgroup::"
              ;;
            *)
              echo "::error::Unknown glyph command: $cmd"
              exit 1
              ;;
          esac
        done

    - name: Clean up config
      if: always()
      shell: bash
      run: rm -f "${{ runner.temp }}/glyph.yaml"
